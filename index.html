<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFY</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* scanlines */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 4px);
    pointer-events: none;
    z-index: 99;
  }

  /* bg glows */
  .g1, .g2, .g3 {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .g1 { width: 350px; height: 350px; background: #cc0000; top: -80px; left: -100px; opacity: 0.1; animation: b 4s infinite alternate; }
  .g2 { width: 280px; height: 280px; background: #ff4400; bottom: -60px; right: -80px; opacity: 0.08; animation: b 5s infinite alternate-reverse; }
  .g3 { width: 200px; height: 200px; background: #ffaa00; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.04; animation: b 3s infinite alternate; }

  @keyframes b {
    from { transform: scale(1); }
    to   { transform: scale(1.2); }
  }
  .g3 { animation: b3 3s infinite alternate; }
  @keyframes b3 {
    from { transform: translate(-50%,-50%) scale(1); }
    to   { transform: translate(-50%,-50%) scale(1.2); }
  }

  .wrap {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 20px;
  }

  .eyebrow {
    font-family: 'Permanent Marker', cursive;
    font-size: 13px;
    color: #ff6600;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.65;
    animation: flicker 6s infinite;
  }

  @keyframes flicker {
    0%,90%,100% { opacity: 0.65; }
    91% { opacity: 0.1; }
    92% { opacity: 0.7; }
    93% { opacity: 0.05; }
  }

  .row {
    display: block;
    font-family: 'Black Ops One', cursive;
    text-transform: uppercase;
    line-height: 0.88;
  }

  .r-go {
    font-size: 72px;
    color: #d0d0d0;
    -webkit-text-stroke: 1px #444;
    letter-spacing: 22px;
    animation: slidein 0.5s ease both;
  }

  .r-fuck {
    font-size: 118px;
    color: #ff1a00;
    -webkit-text-stroke: 2px #ff6600;
    letter-spacing: -2px;
    position: relative;
    animation: slidein 0.5s 0.1s ease both, shake 5s 1s infinite;
    text-shadow:
      4px 5px 0 #800000,
      0 0 40px rgba(255,30,0,0.5);
  }

  .r-yourself {
    font-size: 52px;
    color: #f0f0f0;
    -webkit-text-stroke: 1px #333;
    letter-spacing: 3px;
    animation: slidein 0.5s 0.2s ease both;
  }

  @keyframes slidein {
    from { opacity: 0; transform: translateY(30px) skewX(-5deg); }
    to   { opacity: 1; transform: translateY(0) skewX(0); }
  }

  @keyframes shake {
    0%,92%,100% { transform: translate(0,0); }
    93% { transform: translate(-4px, 2px) skewX(-2deg); }
    94% { transform: translate(4px,-2px) skewX(2deg); }
    95% { transform: translate(-3px, 1px); }
    96% { transform: translate(0,0); }
  }

  /* glitch stripes on FUCK */
  .r-fuck::before {
    content: 'FUCK';
    position: absolute;
    left: 0; right: 0;
    color: #00ffcc;
    -webkit-text-stroke: 0px;
    clip-path: polygon(0 30%, 100% 30%, 100% 45%, 0 45%);
    transform: translateX(-4px);
    opacity: 0;
    animation: glitch 4s infinite;
  }

  .r-fuck::after {
    content: 'FUCK';
    position: absolute;
    left: 0; right: 0;
    color: #ff00ff;
    clip-path: polygon(0 60%, 100% 60%, 100% 70%, 0 70%);
    transform: translateX(4px);
    opacity: 0;
    animation: glitch 4s 0.05s infinite;
  }

  @keyframes glitch {
    0%,88%,100% { opacity: 0; }
    89% { opacity: 0.8; transform: translateX(-6px); }
    90% { opacity: 0; }
    91% { opacity: 0.6; transform: translateX(6px); }
    92% { opacity: 0; }
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 18px 0 14px;
  }

  .dline {
    height: 1px;
    background: linear-gradient(90deg, transparent, #ff2200, transparent);
    animation: expand 2s infinite alternate;
  }
  .dl1 { width: 90px; }
  .dl2 { width: 50px; animation-delay: 0.4s; }

  @keyframes expand {
    from { opacity: 0.3; width: 60px; }
    to   { opacity: 1; width: 100px; }
  }

  .ddot {
    width: 5px; height: 5px;
    background: #ffaa00;
    border-radius: 50%;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .tag {
    font-family: 'Permanent Marker', cursive;
    font-size: 12px;
    color: #555;
    letter-spacing: 5px;
    text-transform: uppercase;
    animation: flicker 8s 2s infinite;
  }

  /* corner graffiti */
  .ctag {
    position: absolute;
    font-family: 'Permanent Marker', cursive;
    font-size: 11px;
    color: #ff2200;
    opacity: 0.2;
    z-index: 20;
  }
  .ctag.tl { top: 24px; left: 20px; transform: rotate(-10deg); }
  .ctag.br { bottom: 24px; right: 20px; transform: rotate(8deg); color: #ffaa00; }
</style>
</head>
<body>

  <div class="g1"></div>
  <div class="g2"></div>
  <div class="g3"></div>

  <div class="ctag tl">STREET 2025</div>
  <div class="ctag br">NO RESPECT</div>

  <div class="wrap">
    <div class="eyebrow">★ message received ★</div>

    <div class="title">
      <span class="row r-go">GO</span>
      <span class="row r-fuck">FUCK</span>
      <span class="row r-yourself">YOURSELF</span>
    </div>

    <div class="divider">
      <div class="dline dl1"></div>
      <div class="ddot"></div>
      <div class="dline dl2"></div>
      <div class="ddot"></div>
      <div class="dline dl1"></div>
    </div>
  </div>

</body>
</html>
